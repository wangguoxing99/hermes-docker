name: Build and Push to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch: 

# 必须添加权限配置，允许 GitHub Actions 推送包到你的仓库
permissions:
  contents: read
  packages: write

jobs:
  build-and-push-ghcr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录到 GitHub 自带的镜像仓库 (ghcr.io)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 使用 GitHub 内置的 Token，无需手动配置

      # 构建并推送到 GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 镜像名称格式：ghcr.io/用户名/仓库名:标签
          tags: ghcr.io/wangguoxing99/hermes-docker:latest
